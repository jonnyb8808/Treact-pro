<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treact</title>
  <link rel="stylesheet" href="./style.css">
  <script src="https://kit.fontawesome.com/4d5fee0365.js" crossorigin="anonymous"></script>
  <script src="./index.js"></script>
</head>
<body>
  <section id="landing">
    <div>
      <nav>
        <div class="nav__container">
          <div class="logo__wrapper">
            <img class="logo" src="./Treact-assets/logo.2c489fc453a1783cbadacf914efa3df6.svg" alt="">
            <p class="logo__description">Treact</p>
            <ul class="nav__links">
              <li><a href="#" class="nav__link">About</a></li>
              <li><a href="#" class="nav__link">Blog</a></li>
              <li><a href="#" class="nav__link">Pricing</a></li>
              <li><a href="#" class="nav__link">Contact Us</a></li>
              <li><a href="#" class="nav__link">Login</a></li>
              <li><a href="#" class="nav__link nav__link--primary">Sign Up</a></li>
            </ul>
          </div>  
        </div>
      </nav>
      <header>
        <div class="header__container ">
          <div class="header__description">
            <h1>Beautiful React Templates <span class="purple">for you.</span></h1>
            <p class="header__para">Our templates are easy to setup, understand, and customize. Fully modular components with a variety of pages and components.</p>
            <div class="email__wrapper">
              <input class="header__email" type="email" placeholder="your email address">
              <input class="header__btn" type="submit" value="Get Started">
            </div>  
            <img class="img__one" src="./Treact-assets/customers-logo-strip.680ac7c2e8ae28161d2c.png" alt="">
          </div>
          <figure class="img__two">    
            <img src="./Treact-assets/design-illustration-2.6da6a00b20c07c4a9b65d1870679e1b8.svg" alt="">
          </figure>  
        </div>  
      </header>
    </div>
  </section>
  
</body>
</html>
